  function startGame() {
      const name = document.getElementById('p-name').value.trim();
      if (!name) return alert("Please enter your name!");
      if (localStorage.getItem('played_' + name)) return alert("You already played!");

      document.getElementById('setup').style.display = 'none';
      document.getElementById('game').style.display = 'block';
      renderGame(name);
  }

function renderGame(name) {
    const container = document.getElementById('list');
    
    // 1. Get UNIQUE hobbies only
    // This looks at all people, grabs their hobbies, and removes any duplicates
    const allHobbies = masterPairs.map(p => p.hobby);
    const uniqueHobbies = [...new Set(allHobbies)]; 
    
    // 2. Scramble the unique list ONCE
    // Make sure the shuffleArray function exists at the bottom of your script!
    shuffleArray(uniqueHobbies);

    // 3. Build the shared options list
    const optionsHtml = uniqueHobbies.map(h => `<option value='${h}'>${h}</option>`).join('');

    let gameHtml = ''; 
    masterPairs.forEach((p, i) => {
    gameHtml += `
        <div class='row'>
            <div class="person-profile">
                <img src="${p.image}" alt="${p.name}" class="profile-pic">
                <b>${p.name}</b>
            </div>
            <select id='s-${i}' onchange="updateProgress()">
                <option value=''>Choose...</option>
                ${optionsHtml}
            </select>
        </div>`;
});


    // 4. Inject into the page
    container.innerHTML = gameHtml;
    window.currentPlayer = name;
}

// CRITICAL: Ensure this function is present in your <script> section!
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

  async function submit() {
      const btn = document.getElementById('sub-btn');
      btn.disabled = true;
      
      let correct = 0;
      let detailedBreakdown = {};
      
      // BUILD RESULTS TABLE
      let resultsHtml = `<table><tr><th>Person</th><th>Your Choice</th><th>Correct Hobby</th><th>Status</th><th>Fun Fact</th></tr>`;

      masterPairs.forEach((p, i) => {
          const userSelection = document.getElementById(`s-${i}`).value;
          const matched = (userSelection === p.hobby);
          
          detailedBreakdown[p.name] = {
              selection: userSelection || "None",
              isCorrect: matched
          };

          if (matched) correct++;

         resultsHtml += `
  <tr>
      <td>
          <img src="${p.image}" style="width:30px; height:30px; border-radius:50%; vertical-align:middle; margin-right:8px;">
          ${p.name}
      </td>
      <td class="${matched ? 'correct' : 'wrong'}">${userSelection || "---"}</td>
      <td>${p.hobby}</td>
      <td>${matched ? '✅' : '❌'}</td>
      <td class="info-text">${p.info}</td>
  </tr>`;

      });

      // disable the "back to start" button
      //resultsHtml += `</table><br><button onclick="location.reload()">Back to Start</button>`;

      try {
          const docRef = db.collection("game_results").doc(window.currentPlayer);
          const docSnap = await docRef.get();

          if (docSnap.exists) {
              alert("You already submitted a score!");
              location.reload();
              return;
          }

          await docRef.set({
              name: window.currentPlayer,
              score: correct,
              breakdown: detailedBreakdown,
              date: new Date()
          });
          
          localStorage.setItem('played_' + window.currentPlayer, 'true');
          
          // REPLACING BODY WITH RESULTS
          document.body.innerHTML = `
            <div class="summary-header">
                <h1>Results for ${window.currentPlayer}</h1>
                <h2>Final Score: ${correct} / 30</h2>
            </div>
            ${resultsHtml}`;

		  showLeaderboard(); 

      } catch (e) {
          console.error(e);
          alert("Submission failed. Check your internet or Firebase rules.");
          btn.disabled = false;
      }
  }
	async function showLeaderboard() {
    const leaderboardDiv = document.createElement('div');
    leaderboardDiv.innerHTML = `<br><hr><h2>🏆 Global Top 3</h2><div id="leader-list">Loading...</div>`;
    document.body.appendChild(leaderboardDiv);

    try {
        // Query Firestore: Sort by score (descending) and date, limit to 3
        const snapshot = await db.collection("game_results")
            .orderBy("score", "desc")
            .orderBy("date", "asc")
            .limit(3)
            .get();

        let listHtml = "<ol style='text-align: left; display: inline-block;'>";
        
        if (snapshot.empty) {
            listHtml += "<li>No scores yet!</li>";
        } else {
            snapshot.forEach(doc => {
                const data = doc.data();
                // Showing only the name as requested
                listHtml += `<li style="margin: 10px 0; font-size: 1.2em;"><b>${data.name}</b></li>`;
            });
        }
        
        listHtml += "</ol>";
        document.getElementById("leader-list").innerHTML = listHtml;
    } catch (e) {
        console.error("Leaderboard Error:", e);
        document.getElementById("leader-list").innerHTML = "Scoreboard temporarily unavailable.";
    }
}
function updateProgress() {
    let filledCount = 0;
    
    for (let i = 0; i < masterPairs.length; i++) {
        const selectElement = document.getElementById(`s-${i}`);
        const rowElement = selectElement.closest('.row'); // Finds the parent row div
        
        if (selectElement.value !== "") {
            filledCount++;
            rowElement.classList.add('row-selected');
        } else {
            rowElement.classList.remove('row-selected');
        }
    }

    // Update the progress bar as before
    const percent = (filledCount / masterPairs.length) * 100;
    document.getElementById('progress-bar').style.width = percent + "%";
    document.getElementById('progress-text').innerText = `Matched: ${filledCount} / ${masterPairs.length}`;
}

<style>

	#sticky-header {
    position: sticky;
    top: 0;
    background: white;
    padding: 15px;
    border-bottom: 2px solid #007bff;
    z-index: 1000;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
}

#progress-container {
    width: 100%;
    background-color: #e0e0e0;
    border-radius: 10px;
    height: 12px;
    margin-bottom: 5px;
    overflow: hidden;
}

#progress-bar {
    width: 0%;
    height: 100%;
    background-color: #28a745;
    transition: width 0.3s ease; /* Smooth sliding animation */
}

#progress-text {
    margin: 0;
    font-weight: bold;
    font-size: 0.9em;
    color: #555;
}
/* The base row style needs a transition for the color fade */
.row { 
    transition: background-color 0.4s ease, border-left 0.4s ease;
    padding: 10px;
    border-radius: 6px;
    border-left: 4px solid transparent; /* Hidden until selected */
}

/* The highlight style for filled rows */
.row-selected {
    background-color: #e7f3ff; /* Light Blue */
    border-left: 4px solid #007bff; /* Bright Blue accent */
}
.person-profile {
    display: flex;
    align-items: center;
    gap: 12px;
}

.profile-pic {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #007bff;
    background-color: #eee; /* Fallback color */
}

/* Adjust row height to fit photos and dropdowns side-by-side */
.row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px;
    margin: 8px 0;
    max-width: 500px;
}

</style>
