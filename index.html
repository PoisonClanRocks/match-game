  function startGame() {
      const name = document.getElementById('p-name').value.trim();
      if (!name) return alert("Please enter your name!");
      if (localStorage.getItem('played_' + name)) return alert("You already played!");

	// SHUFFLE NAMES HERE:
    // This randomizes the order of people before they are rendered
    shuffleArray(masterPairs);
	  
      document.getElementById('setup').style.display = 'none';
      document.getElementById('game').style.display = 'block';
      renderGame(name);
  }

function renderGame(name) {
    const container = document.getElementById('list');
    
    // 1. Get UNIQUE hobbies only
    // This looks at all people, grabs their hobbies, and removes any duplicates
    const allHobbies = masterPairs.map(p => p.hobby);
    const uniqueHobbies = [...new Set(allHobbies)]; 
    
    // 2. Scramble the unique list ONCE
    // Make sure the shuffleArray function exists at the bottom of your script!
    shuffleArray(uniqueHobbies);

    // 3. Build the shared options list
    const optionsHtml = uniqueHobbies.map(h => `<option value='${h}'>${h}</option>`).join('');

    let gameHtml = ''; 
masterPairs.forEach((p, i) => {
    gameHtml += `
        <div class='row'>
            <div class="person-profile">
                <img src="${p.image}" alt="${p.name}" class="profile-pic">
                <div class="name-container">
                    <span class="person-name">${p.name}</span>
                </div>
            </div>
            <div class="select-wrapper">
                <select id='s-${i}' onchange="updateProgress()">
                    <option value=''>Choose Hobby...</option>
                    ${optionsHtml}
                </select>
            </div>
        </div>`;
});



    // 4. Inject into the page
    container.innerHTML = gameHtml;
    window.currentPlayer = name;
}

// CRITICAL: Ensure this function is present in your <script> section!
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

  async function submit() {
      const btn = document.getElementById('sub-btn');
      btn.disabled = true;
      
      let correct = 0;
      let detailedBreakdown = {};
      
      // BUILD RESULTS GRID
      let resultsHtml = `<div class="results-grid">`;

      masterPairs.forEach((p, i) => {
          const userSelection = document.getElementById(`s-${i}`).value;
          const matched = (userSelection === p.hobby);
          
          detailedBreakdown[p.name] = {
              selection: userSelection || "None",
              isCorrect: matched
          };

          if (matched) correct++;

          // Build a Card instead of a Table Row
          resultsHtml += `
            <div class="result-card match-${matched}">
                <div class="card-header">
                    <img src="${p.image}" class="profile-pic" style="width:40px; height:40px; border:none; box-shadow:none;">
                    <span class="person-name" style="font-size:1rem;">${p.name}</span>
                    <span style="margin-left:auto">${matched ? '✅' : '❌'}</span>
                </div>
                
                <div style="margin: 10px 0;">
                    <span style="font-size:0.75rem; text-transform:uppercase; color:var(--text-muted); font-weight:700;">Your Choice</span><br>
                    <span class="${matched ? 'correct' : 'wrong'}" style="font-size:1rem;">${userSelection || "No Selection"}</span>
                </div>

                ${!matched ? `
                <div style="margin-bottom: 10px;">
                    <span style="font-size:0.75rem; text-transform:uppercase; color:var(--text-muted); font-weight:700;">Correct Hobby</span><br>
                    <span style="font-weight:700; color:var(--text-main);">${p.hobby}</span>
                </div>` : ''}

                <div class="card-info">
                    <strong style="color:var(--primary);">Did you know?</strong><br>
                    ${p.info}
                </div>
            </div>`;
      });

      resultsHtml += `</div>`;

      try {
          const docRef = db.collection("game_results").doc(window.currentPlayer);
          const docSnap = await docRef.get();

          if (docSnap.exists) {
              alert("You already submitted a score!");
              location.reload();
              return;
          }

          await docRef.set({
              name: window.currentPlayer,
              score: correct,
              breakdown: detailedBreakdown,
              date: new Date()
          });
          
          localStorage.setItem('played_' + window.currentPlayer, 'true');
          
          // 1. Update the HTML on the screen with Logo, Results, and Final Note
          document.body.innerHTML = `
            <img src="images/performance_logo.jpg" alt="Company Logo" class="company-logo">
            
            <div class="summary-header">
                <h1 class="results-title">
                    Nice work, <br>
                    <span class="results-name-highlight">${window.currentPlayer}!</span>
                </h1>
                <div class="score-badge">
                    Final Score: ${correct} / 30
                </div>
            </div>
            
            ${resultsHtml}

            <!-- The Personal Thank You Message -->
            <div class="final-note">
                Thank you for playing! I hope you had fun testing your knowledge of your team members, 
                as well as maybe learning a thing or two about someone.<br><br>
                I had a lot of fun making this game and discovering that I have 
                something in common with many of you!
                <div class="final-signature">✨ Thanks for being part of the team ✨</div>
            </div>
          `;

          // 2. Scroll smoothly to the top
          window.scrollTo({ top: 0, behavior: 'smooth' });

          // 3. Launch the celebration
          confetti({
              particleCount: 150,
              spread: 70,
              origin: { y: 0.6 },
              colors: ['#6366f1', '#22c55e', '#f59e0b'],
              zIndex: 9999
          });

      } catch (e) {
          console.error(e);
          alert("Submission failed. Check your internet or Firebase rules.");
          btn.disabled = false;
      }
  }

	async function showLeaderboard() {
    const leaderboardDiv = document.createElement('div');
    leaderboardDiv.innerHTML = `<br><hr><h2>🏆 Global Top 3</h2><div id="leader-list">Loading...</div>`;
    document.body.appendChild(leaderboardDiv);

    try {
        // Query Firestore: Sort by score (descending) and date, limit to 3
        const snapshot = await db.collection("game_results")
            .orderBy("score", "desc")
            .orderBy("date", "asc")
            .limit(3)
            .get();

        let listHtml = "<ol style='text-align: left; display: inline-block;'>";
        
        if (snapshot.empty) {
            listHtml += "<li>No scores yet!</li>";
        } else {
            snapshot.forEach(doc => {
                const data = doc.data();
                // Showing only the name as requested
                listHtml += `<li style="margin: 10px 0; font-size: 1.2em;"><b>${data.name}</b></li>`;
            });
        }
        
        listHtml += "</ol>";
        document.getElementById("leader-list").innerHTML = listHtml;
    } catch (e) {
        console.error("Leaderboard Error:", e);
        document.getElementById("leader-list").innerHTML = "Scoreboard temporarily unavailable.";
    }
}
function updateProgress() {
    let filledCount = 0;
    
    for (let i = 0; i < masterPairs.length; i++) {
        const selectElement = document.getElementById(`s-${i}`);
        const rowElement = selectElement.closest('.row'); // Finds the parent row div
        
        if (selectElement.value !== "") {
            filledCount++;
            rowElement.classList.add('row-selected');
        } else {
            rowElement.classList.remove('row-selected');
        }
    }

    // Update the progress bar as before
    const percent = (filledCount / masterPairs.length) * 100;
    document.getElementById('progress-bar').style.width = percent + "%";
    document.getElementById('progress-text').innerText = `Matched: ${filledCount} / ${masterPairs.length}`;
}
