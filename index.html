<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>30-Pair Secure Match</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyA90-AVLd6EZXm-y7r6kKpTCerbg0Sv93E",
    authDomain: "collins-match-game.firebaseapp.com",
    projectId: "collins-match-game",
    storageBucket: "collins-match-game.firebasestorage.app",
    messagingSenderId: "580574919571",
    appId: "1:580574919571:web:f1cbf7cec28a62dacc8666",
    measurementId: "G-719ZJRNTYP"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const masterPairs = [
      { name: "Aiden", hobby: "Geocaching" }, { name: "Bella", hobby: "Extreme Ironing" },
      { name: "Caleb", hobby: "Tree Shaping" }, { name: "Dahlia", hobby: "Element Collecting" },
      { name: "Ezra", hobby: "Astronomy" }, { name: "Fiona", hobby: "Archery" },
      { name: "Gideon", hobby: "Woodworking" }, { name: "Hazel", hobby: "Leather Crafting" },
      { name: "Isaac", hobby: "Fencing" }, { name: "Jade", hobby: "Diorama Building" },
      { name: "Kai", hobby: "Scuba Diving" }, { name: "Luna", hobby: "Stargazing" },
      { name: "Milo", hobby: "Model Rocketry" }, { name: "Nora", hobby: "Bird Watching" },
      { name: "Owen", hobby: "Composting" }, { name: "Kora", hobby: "Soap Making" },
      { name: "Liam", hobby: "Stone Skipping" }, { name: "Maya", hobby: "Beetle Fighting" },
      { name: "Nolan", hobby: "Newsraiding" }, { name: "Olive", hobby: "Herbalism" },
      { name: "Piper", hobby: "Mixology" }, { name: "Quinn", hobby: "Candle Making" },
      { name: "Riley", hobby: "Metalworking" }, { name: "Silas", hobby: "Whittling" },
      { name: "Tessa", hobby: "Origami" }, { name: "Uri", hobby: "Meteorology" },
      { name: "Vera", hobby: "Calligraphy" }, { name: "Wyatt", hobby: "Glass Blowing" },
      { name: "Xena", hobby: "Pottery" }, { name: "Yara", hobby: "Digital Art" }
  ];

  function startGame() {
      const name = document.getElementById('p-name').value.trim();
      if (!name) return alert("Please enter your name!");
      if (localStorage.getItem('played_' + name)) return alert("You already played!");

      document.getElementById('setup').style.display = 'none';
      document.getElementById('game').style.display = 'block';
      renderGame(name);
  }

  function renderGame(name) {
      const container = document.getElementById('list');
      const hobbies = [...masterPairs].map(p => p.hobby).sort(() => Math.random() - 0.5);
      let gameHtml = ''; 
      masterPairs.forEach((p, i) => {
          gameHtml += `<div class='row'><b>${p.name}</b>: 
              <select id='s-${i}'><option value=''>Choose...</option>
              ${hobbies.map(h => `<option value='${h}'>${h}</option>`).join('')}</select></div>`;
      });
      container.innerHTML = gameHtml;
      window.currentPlayer = name;
  }

  async function submit() {
      const btn = document.getElementById('sub-btn');
      btn.disabled = true;
      
      let correct = 0;
      let detailedBreakdown = {};
      
      // Start building the results table HTML
      let resultsHtml = `<div class="summary-header"><h1>Results for ${window.currentPlayer}</h1></div>`;
      resultsHtml += `<table><tr><th>Person</th><th>Your Choice</th><th>Correct Hobby</th><th>Status</th></tr>`;

      masterPairs.forEach((p, i) => {
          const userSelection = document.getElementById(`s-${i}`).value;
          const matched = (userSelection === p.hobby);
          
          detailedBreakdown[p.name] = {
              selection: userSelection || "None",
              isCorrect: matched
          };

          if (matched) correct++;

          // Add row to table
          resultsHtml += `
            <tr>
                <td>${p.name}</td>
                <td class="${matched ? 'correct' : 'wrong'}">${userSelection || "---"}</td>
                <td>${p.hobby}</td>
                <td>${matched ? '✅' : '❌'}</td>
            </tr>`;
      });

      resultsHtml += `</table><br><button onclick="location.reload()">Back to Start</button>`;

      try {
          const docRef = db.collection("game_results").doc(window.currentPlayer);
          const docSnap = await docRef.get();

          if (docSnap.exists) {
              alert("You have already submitted a score!");
              location.reload();
              return;
          }

          await docRef.set({
              name: window.currentPlayer,
              score: correct,
              breakdown: detailedBreakdown,
              date: new Date()
          });
          
          localStorage.setItem('played_' + window.currentPlayer, 'true');
          
          // Display the results table on the screen
          document.body.innerHTML = `
            <div class="summary-header">
                <h1>Score: ${correct} / 30</h1>
            </div>
            ${resultsHtml}`;

      } catch (e) {
          console.error(e);
          alert("Submission failed.");
          btn.disabled = false;
      }
  }
</script>

<style>
    body { font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .row { margin: 10px 0; width: 100%; display: flex; justify-content: space-between; max-width: 400px; }
    button { padding: 10px 20px; background: #007bff; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    .correct { color: #28a745; font-weight: bold; }
    .wrong { color: #dc3545; font-weight: bold; }
    table { border-collapse: collapse; width: 100%; max-width: 600px; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; }
    .summary-header { text-align: center; margin-bottom: 20px; }
    tr:nth-child(even) { background-color: #f9f9f9; }
</style>
</head>
<body>
    <div id="setup">
        <input type="text" id="p-name" placeholder="Your Name">
        <button onclick="startGame()">Start</button>
    </div>
    <div id="game" style="display:none;">
        <div id="list"></div>
        <button id="sub-btn" onclick="submit()">Submit Answers</button>
    </div>
</body>
</html>
